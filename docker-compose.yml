services:

  zookeeper:
    image: wurstmeister/zookeeper
    ports:
      - "2181:2181"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - zookeeper-data:/data  #lab9

  kafka:
    image: wurstmeister/kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INSIDE://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:29092,OUTSIDE://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_CREATE_TOPICS: "events:1:1"
    volumes: #lab9
      - kafka-data:/kafka 
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  db:
    image: mysql
    environment:
      MYSQL_USER: chelsie
      MYSQL_PASSWORD: acit3855-2026
      MYSQL_DATABASE: monitoring
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  storage-service:
    build:
      context: storage-mysql
      dockerfile: Dockerfile
    #ports:
     # - "8091:8091"  
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8091/monitoring/performance?start_timestamp=2020-01-01T00:00:00Z&end_timestamp=2020-01-02T00:00:00Z')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes: #lab9
      - ./config/storage_config.yml:/config/storage_config.yml
      - ./config/storage_log_config.yml:/config/storage_log_config.yml
      - ./logs:/logs
 

  receiver-service:
    build:
      context: receiver
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-network
    volumes: #lab9
      - ./config/receiver_config.yml:/config/receiver_config.yml
      - ./config/receiver_log_config.yml:/config/receiver_log_config.yml
      - ./logs:/logs

  processing-service:
    build:
      context: processing
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    depends_on:
      storage-service:
        condition: service_healthy
    networks:
      - app-network
    volumes: #lab9
      - ./config/processing_config.yml:/config/processing_config.yml
      - ./config/processing_log_config.yml:/config/processing_log_config.yml
      - ./logs:/logs
      - ./data/processing:/data  

  analyzer-service:
    build:
      context: analyzer
      dockerfile: Dockerfile
    ports:
      - "5005:5005"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-network
    volumes: #lab9
      - ./config/analyzer_config.yml:/config/analyzer_config.yml
      - ./config/analyzer_log_config.yml:/config/analyzer_log_config.yml
      - ./logs:/logs
 

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data:
  kafka-data:      #lab9
  zookeeper-data:  #lab9
