openapi: 3.0.3
info:
  description: This API provides read-only access to system monitoring data stored from Kafka events. Data is consumed from Kafka topic 'events' and stored in MySQL.
  version: "2.0.0"
  title: Enterprise System Monitoring Storage API
  contact:
    email: lelechelsie@gmail.com

paths:
  /monitoring/performance:
    get:
      summary: Gets performance readings between timestamps
      operationId: app.get_performance_readings
      description: Retrieves performance readings (CPU, memory, disk I/O) that were stored from Kafka events over a specified timespan
      parameters:
        - name: start_timestamp
          in: query
          description: Start of the timespan (ISO 8601 format)
          required: true
          schema:
            type: string
            format: date-time
            example: "2026-01-14T10:00:00Z"
        - name: end_timestamp
          in: query
          description: End of the timespan (ISO 8601 format)
          required: true
          schema:
            type: string
            format: date-time
            example: "2026-01-14T11:00:00Z"
      responses:
        '200':
          description: Successfully returned performance readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PerformanceReading'
        '400':
          description: Invalid request parameters (e.g., malformed timestamps)

  /monitoring/errors:
    get:
      summary: Gets error readings between timestamps
      operationId: app.get_error_readings
      description: Retrieves error readings (error codes, severity, response times) that were stored from Kafka events over a specified timespan
      parameters:
        - name: start_timestamp
          in: query
          description: Start of the timespan (ISO 8601 format)
          required: true
          schema:
            type: string
            format: date-time
            example: "2026-01-14T10:00:00Z"
        - name: end_timestamp
          in: query
          description: End of the timespan (ISO 8601 format)
          required: true
          schema:
            type: string
            format: date-time
            example: "2026-01-14T11:00:00Z"
      responses:
        '200':
          description: Successfully returned error readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ErrorReading'
        '400':
          description: Invalid request parameters (e.g., malformed timestamps)

components:
  schemas:
    PerformanceReading:
      required:
        - trace_id
        - server_id
        - reporting_timestamp
        - cpu
        - memory
        - disk_io
        - date_created
      properties:
        trace_id:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-4789-a012-3456789abcde"
          description: Unique identifier for this reading (from Kafka message)
        server_id:
          type: string
          example: "server-001"
          description: Server identifier that reported this metric
        reporting_timestamp:
          type: string
          format: date-time
          example: "2026-01-14T10:00:00Z"
          description: When the metric was originally reported by the server
        cpu:
          type: number
          format: float
          example: 72.5
          description: CPU usage percentage
        memory:
          type: number
          format: float
          example: 64.2
          description: Memory usage percentage
        disk_io:
          type: number
          format: float
          example: 120.5
          description: Disk I/O operations per second
        date_created:
          type: string
          format: date-time
          example: "2026-01-14T10:00:05Z"
          description: When this reading was stored in the database
      type: object

    ErrorReading:
      required:
        - trace_id
        - server_id
        - reporting_timestamp
        - error_code
        - severity_level
        - avg_response_time
        - error_message
        - date_created
      properties:
        trace_id:
          type: string
          format: uuid
          example: "b2c3d4e5-f6a7-4890-b123-456789abcdef"
          description: Unique identifier for this reading (from Kafka message)
        server_id:
          type: string
          example: "server-002"
          description: Server identifier that reported this error
        reporting_timestamp:
          type: string
          format: date-time
          example: "2026-01-14T10:00:00Z"
          description: When the error was originally reported by the server
        error_code:
          type: string
          example: "500"
          description: HTTP error code or custom error identifier
        severity_level:
          type: integer
          minimum: 1
          maximum: 5
          example: 4
          description: Error severity (1=Low, 2=Medium, 3=High, 4=Critical, 5=Fatal)
        avg_response_time:
          type: number
          format: float
          example: 1200.5
          description: Average response time in milliseconds when error occurred
        error_message:
          type: string
          maxLength: 500
          example: "Database connection timeout after 30s"
          description: Detailed error message
        date_created:
          type: string
          format: date-time
          example: "2026-01-14T10:00:05Z"
          description: When this error reading was stored in the database
      type: object
